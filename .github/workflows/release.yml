name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for NuGet trusted publishing (OIDC token exchange).
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/Enx.RavenDB.Utils/Enx.RavenDB.Utils.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=${GITHUB_REF_NAME#v}

      # Exchanges the GitHub OIDC token for a short-lived NuGet API key.
      # Configure the trusted publishing policy on nuget.org and set the `user` below.
      - name: NuGet login (trusted publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: TheKeyblader

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
